<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kitu ❤️ Petishh</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    overflow: hidden;
}

/* Background video */
video {
    position: fixed;
    top: 0;
    left: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* Intro */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2em;
}

/* Main */
#main {
    display: none;
    padding-top: 80px;
}

/* Typing */
.typing {
    font-size: 2.5em;
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    animation: typing 3s steps(20) forwards, blink 0.7s infinite;
}

@keyframes typing {
    to { width: 100%; }
}

@keyframes blink {
    50% { border-color: transparent; }
}

/* Message */
.message {
    font-size: 1.5em;
    margin: 20px;
    opacity: 0;
    animation: fadeIn 3s forwards;
    animation-delay: 3s;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

/* Slideshow */
.slideshow img {
    width: 250px;
    border-radius: 20px;
    margin: 10px;
    display: none;
}

.slideshow img.active {
    display: block;
}

/* Buttons */
button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: red;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

#noBtn {
    position: absolute;
}

/* Hearts */
.heart {
    position: fixed;
    color: red;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<!-- Background Video -->
<video autoplay muted loop>
    <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<!-- Intro -->
<div id="intro">
    🎬 A Love Story by Kitu...
</div>

<!-- Main -->
<div id="main">

    <h1 class="typing">Hi Petishh ❤️</h1>

    <div class="message">
        You are the source of my happiness, joy,<br>
        the centre of my world and the whole of my heart 💖<br><br>
        — Yours forever, Kitu 💘
    </div>

    <!-- Slideshow -->
    <div class="slideshow">
        <img src="photo1.jpg" class="active">
        <img src="photo2.jpg">
        <img src="photo3.jpg">
    </div>

    <h2>Will you be mine forever? 💍</h2>

    <button onclick="yesClicked()">Yes 💖</button>
    <button id="noBtn" onmouseover="moveButton()">No 😜</button>

</div>

<!-- Music -->
<audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
// Intro
setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("main").style.display = "block";
}, 3000);

// Slideshow
let index = 0;
let slides = document.querySelectorAll(".slideshow img");

setInterval(() => {
    slides.forEach(img => img.classList.remove("active"));
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}, 2000);

// Yes
function yesClicked() {
    alert("You just made me the happiest person alive ❤️😭");
}

// No button
function moveButton() {
    let btn = document.getElementById("noBtn");
    btn.style.top = Math.random() * window.innerHeight + "px";
    btn.style.left = Math.random() * window.innerWidth + "px";
}

// Hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
